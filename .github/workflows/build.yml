name: Build GWBHJ

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
            ndk_target: arm64-v8a
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi
            ndk_target: armeabi-v7a
          - abi: x86_64
            target: x86_64-linux-android
            ndk_target: x86_64
          - abi: x86
            target: i686-linux-android
            ndk_target: x86

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Build ${{ matrix.abi }}
        run: |
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          API=21

          mkdir -p .build/cmake-${{ matrix.abi }}
          cd .build/cmake-${{ matrix.abi }}

          cmake -S ${{ github.workspace }}/src -B . \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-$API \
            -DCMAKE_BUILD_TYPE=MinSizeRel

          cmake --build . -j$(nproc)

          mkdir -p ${{ github.workspace }}/.build/stage/zygisk
          cp libspoof.so ${{ github.workspace }}/.build/stage/zygisk/${{ matrix.abi }}.so
          $TOOLCHAIN/bin/llvm-strip --strip-unneeded ${{ github.workspace }}/.build/stage/zygisk/${{ matrix.abi }}.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.abi }}
          path: .build/stage/zygisk/${{ matrix.abi }}.so

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all ABIs
        uses: actions/download-artifact@v4
        with:
          path: .build/abis

      - name: Package module
        run: |
          VERSION="1.2.1"
          VERSION_CODE="121"
          STAGE=".build/stage"

          mkdir -p "$STAGE/zygisk"

          cp -r module/. "$STAGE/"

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            cp ".build/abis/$abi/$abi.so" "$STAGE/zygisk/"
          done

          printf 'id=gwbhj_jailbreak\nname=过强标黑机\nversion=%s\nversionCode=%s\nauthor=蜡笔不小心\ndescription=支持ANDROID_ID伪造与序列号控制,白名单,自带越狱免解过环境\nminMagisk=20.4\n' "$VERSION" "$VERSION_CODE" > "$STAGE/module.prop"

          chmod 0755 "$STAGE/customize.sh" "$STAGE/service.sh" "$STAGE/uninstall.sh" \
                     "$STAGE/action.sh" \
                     "$STAGE/META-INF/com/google/android/update-binary"
          chmod 0644 "$STAGE/whitelist.txt"

          cd "$STAGE"
          zip -r -q -X "$GITHUB_WORKSPACE/GWBHJ-v${VERSION}.zip" . -x '.*'

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GWBHJ-module
          path: GWBHJ-v1.2.1.zip
