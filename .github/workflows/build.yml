name: Build GWBHJ

on:
  push:
    branches: [main, v2.0-auth-system]
  workflow_dispatch:

jobs:
  build-module:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi
          - abi: x86_64
            target: x86_64-linux-android
          - abi: x86
            target: i686-linux-android

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Build ${{ matrix.abi }}
        run: |
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          API=21

          mkdir -p .build/cmake-${{ matrix.abi }}
          cd .build/cmake-${{ matrix.abi }}

          cmake -S ${{ github.workspace }}/src -B . \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-$API \
            -DCMAKE_BUILD_TYPE=MinSizeRel

          cmake --build . -j$(nproc)

          mkdir -p ${{ github.workspace }}/.build/stage/zygisk
          cp libspoof.so ${{ github.workspace }}/.build/stage/zygisk/${{ matrix.abi }}.so
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded \
            ${{ github.workspace }}/.build/stage/zygisk/${{ matrix.abi }}.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.abi }}
          path: .build/stage/zygisk/${{ matrix.abi }}.so

  package-module:
    needs: build-module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all ABIs
        uses: actions/download-artifact@v4
        with:
          path: .build/abis

      - name: Package module
        run: |
          VERSION="2.0.0"
          VERSION_CODE="200"
          STAGE=".build/stage"

          mkdir -p "$STAGE/zygisk"
          cp -r module/. "$STAGE/"

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            cp ".build/abis/$abi/$abi.so" "$STAGE/zygisk/"
          done

          cat > "$STAGE/module.prop" << 'PROPEOF'
id=gwbhj_jailbreak
name=过强标黑机
version=2.0.0
versionCode=200
author=蜡笔不小心
description=过腾讯黑名单，白名单控制+授权验证+互抵锁死+越狱环境+冻结多开。v2.0 授权系统。
minMagisk=20.4
PROPEOF

          chmod 0755 "$STAGE/customize.sh" "$STAGE/service.sh" "$STAGE/uninstall.sh" \
                     "$STAGE/action.sh" \
                     "$STAGE/META-INF/com/google/android/update-binary"
          chmod 0644 "$STAGE/whitelist.txt" "$STAGE/freeze_list.txt"

          cd "$STAGE"
          zip -r -q -X "$GITHUB_WORKSPACE/GWBHJ-v${VERSION}.zip" . -x '.*'

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GWBHJ-module-v2.0.0
          path: GWBHJ-v2.0.0.zip

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: apk
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        working-directory: apk
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GWBHJ-Manager-APK
          path: apk/app/build/outputs/apk/release/*.apk
